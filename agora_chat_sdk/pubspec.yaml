name: agora_chat_sdk
description: Integrate the Chat SDK to enjoy the global IM services with high reliability, ultra-low latency, and high concurrency.
version: 1.4.0
homepage: https://www.agora.io/en/

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

  agora_chat_sdk_interface:
    path: ../agora_chat_sdk_interface

  agora_chat_sdk_ios:
    path: ../agora_chat_sdk_ios

  agora_chat_sdk_android:
    path: ../agora_chat_sdk_android


dev_dependencies:
  flutter_lints: ^4.0.0



flutter:
  plugin:
    platforms:
      ios:
        default_package: agora_chat_sdk_ios
      android:
        default_package: agora_chat_sdk_android
